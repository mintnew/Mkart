name: Reusable CD Pipeline

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
      ecr_uri:
        required: true
        type: string
      manifest_path:
        required: true
        type: string
      environment:
        required: true
        type: string

permissions:
  contents: write   # 🔥 REQUIRED for git push
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo with full history (IMPORTANT)
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # 🔥 REQUIRED for git push

      # 2. Update Kubernetes Manifest
      - name: Update Manifest Image
        run: |
          sed -i "s|image: .*|image: ${{ inputs.ecr_uri }}:${{ inputs.image_tag }}|g" ${{ inputs.manifest_path }}

      # 3. Commit changes
      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add ${{ inputs.manifest_path }}

          git commit -m "Deploy (${{ inputs.environment }}): ${{ inputs.image_tag }}" || echo "No changes"

      # 4. Push using PAT (FIXED SAFELY)
      - name: Push changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/mintnew/Mkart.git
          git push origin HEAD:main